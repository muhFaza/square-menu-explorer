name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, typecheck, test, build, E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `pnpm lint:fix` rewrites files, which is right locally and wrong in CI,
      # so the gate runs the checking halves separately.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit, integration, and component tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      # The suite runs a desktop and an exact-375px project, both Chromium.
      # No Square credentials are needed: the specs intercept every API call.
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e:built

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
