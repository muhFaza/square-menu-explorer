services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Runtime secrets (SQUARE_ACCESS_TOKEN, SQUARE_ENVIRONMENT) and PORT come from
    # the local, uncommitted .env.local — nothing is baked into the image.
    env_file: .env.local
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      # BusyBox wget ships in node:22-alpine; a non-2xx status makes it exit non-zero.
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/locations"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
